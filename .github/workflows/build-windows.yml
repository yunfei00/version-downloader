name: Build Windows Executable

permissions:
  contents: write

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build exe
        run: |
          pyinstaller --noconfirm --onefile --windowed --name VersionDownloader --collect-all PySide6 main.py

      - name: Create Release
        id: create_release
        continue-on-error: true
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref_name }}
          release_name: Version Downloader ${{ github.ref_name }}
          body: Auto build release
          draft: false
          prerelease: false

      - name: Resolve release upload URL
        id: release_info
        uses: actions/github-script@v7
        env:
          CREATE_RELEASE_UPLOAD_URL: ${{ steps.create_release.outputs.upload_url }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fromCreate = process.env.CREATE_RELEASE_UPLOAD_URL;
            if (fromCreate) {
              core.setOutput('upload_url', fromCreate);
              return;
            }

            const { owner, repo } = context.repo;
            const tag = context.ref.replace('refs/tags/', '');
            const release = await github.rest.repos.getReleaseByTag({
              owner,
              repo,
              tag,
            });
            core.setOutput('upload_url', release.data.upload_url);

      - name: Delete existing asset if exists
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const { owner, repo } = context.repo;
            const tag = context.ref.replace('refs/tags/', '');
            const assetName = 'VersionDownloader.exe';

            const release = await github.rest.repos.getReleaseByTag({
              owner,
              repo,
              tag,
            });

            const oldAsset = release.data.assets.find((asset) => asset.name === assetName);
            if (oldAsset) {
              await github.rest.repos.deleteReleaseAsset({
                owner,
                repo,
                asset_id: oldAsset.id,
              });
            }

      - name: Upload Release Asset
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.release_info.outputs.upload_url }}
          asset_path: dist/VersionDownloader.exe
          asset_name: VersionDownloader.exe
          asset_content_type: application/octet-stream
